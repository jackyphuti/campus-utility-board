name: Backend CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: App smoke check
        run: npm run check
        env:
          JWT_SECRET: ci_jwt_secret_that_is_long_enough_1234567890

      - name: Run tests
        run: npm test
        env:
          JWT_SECRET: ci_jwt_secret_that_is_long_enough_1234567890
